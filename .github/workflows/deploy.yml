name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up back environment from .env
        run: |
          echo "${{ secrets.ENV_FILE_BACK }}" | base64 -d > .env
          scp .env $VPS_USER@$VPS_IP:/home/ubuntu/deepsee-back/.env

      - name: Set up front environment from .env
        run: |
          echo "${{ secrets.ENV_FILE_FRONT }}" | base64 -d > .env
          scp .env $VPS_USER@$VPS_IP:/home/ubuntu/deepsee-front/.env

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t titeshi/deepsee:latest .

      - name: Push Docker image
        run: |
          docker push titeshi/deepsee:latest

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy to VPS
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_IP "bash /home/ubuntu/deploy.sh"
